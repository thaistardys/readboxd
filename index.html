<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readboxd</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Readboxd</h1>
    </header>

    <main class="container">
        <!-- Barra de Ações: Busca + Botão Novo -->
        <section class="actions-bar">
            <div class="search-group">
                <input type="text" id="search-book" placeholder="Pesquisar livros pelo título...">
            </div>
            <button type="button" id="btn-open-modal">+ Novo</button>
        </section>

        <!-- Área de Exibição dos Livros -->
        <section class="card-area list-box">
            <h2>Meus Livros</h2>
            
            <!-- Painel de Contadores -->
            <div class="counters-grid">
                <div class="counter-card active" data-filter="all">
                    <span class="counter-num" id="count-total">0</span>
                    <span class="counter-label">Total</span>
                </div>
                <div class="counter-card status-completed" data-filter="completed">
                    <span class="counter-num" id="count-completed">0</span>
                    <span class="counter-label">Lidos</span>
                </div>
                <div class="counter-card status-reading" data-filter="reading">
                    <span class="counter-num" id="count-reading">0</span>
                    <span class="counter-label">Em Andamento</span>
                </div>
                <div class="counter-card status-not-started" data-filter="not-started">
                    <span class="counter-num" id="count-not-started">0</span>
                    <span class="counter-label">Não Iniciados</span>
                </div>
            </div>

            <div id="books-container" class="books-grid">
                <!-- Cards inseridos via JS -->
            </div>
        </section>

        <!-- Modal do Formulário -->
        <div id="book-modal" class="modal-overlay">
            <div class="modal-content card-area">
                <div class="modal-header">
                    <h2 id="modal-title">Adicionar Novo Livro</h2>
                    <button type="button" id="btn-close-modal">&times;</button>
                </div>
                <form id="book-form">
                    <div class="input-group">
                        <label for="book-title">Nome do Livro:</label>
                        <input type="text" id="book-title" required placeholder="Ex: O Hobbit">
                    </div>

                    <div class="input-group">
                        <label for="book-author">Autor:</label>
                        <input type="text" id="book-author" required placeholder="Ex: J.R.R. Tolkien">
                    </div>

                    <div class="input-group">
                        <label for="book-synopsis">Sinopse (Opcional):</label>
                        <textarea id="book-synopsis" placeholder="Breve resumo do livro..."></textarea>
                    </div>

                    <div class="input-group">
                        <label for="book-cover">Link da Capa (URL):</label>
                        <input type="url" id="book-cover" required placeholder="https://linkdaimagem.com">
                    </div>

                    <div class="input-group">
                        <label>Status de Leitura:</label>
                        <div class="status-selector">
                            <button type="button" class="status-btn btn-completed" data-status="completed">Lido</button>
                            <button type="button" class="status-btn btn-reading" data-status="reading">Em Andamento</button>
                            <button type="button" class="status-btn btn-not-started" data-status="not-started">Não Iniciado</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Sua Avaliação:</label>
                        <div class="star-rating">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                    </div>

                    <button type="submit" id="btn-submit-form">Adicionar Livro</button>
                </form>
            </div>
        </div>

        <!-- Modal de Alerta Customizado -->
        <div id="alert-modal" class="modal-overlay alert-z-index">
            <div class="modal-content card-area alert-modal-content">
                <div class="alert-icon">⚠️</div>
                <h2>Livro Já Cadastrado</h2>
                <p id="alert-modal-message"></p>
                <button type="button" id="btn-close-alert">Entendido</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Todos os direitos reservados &copy; 2026.</p>
    </footer>

</body>
</html>
